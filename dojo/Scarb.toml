[package] 
name = "feral"
version = "0.1.2"
edition = "2024_07"
cairo-version = "2.15.0"
license = "CC0-1.0"

[cairo]
sierra-replace-ids = true
panic-backtrace = true

[dependencies]
starknet = "2.15.1"
dojo = "=1.8.0"
openzeppelin_token = "3.0.0"
openzeppelin_introspection = "3.0.0"
nft_combo = { git = "https://github.com/underware-gg/cairo-nft-combo", tag = "v1.2.1" }
# achievement = { git = "https://github.com/cartridge-gg/arcade", rev = "a4de9f4c38814a19716b6c5f9cbd4213645e9cb1" }
# graffiti = { git = "https://github.com/rsodre/graffiti", rev = "url" }

[dev-dependencies]
dojo_snf_test = "=1.8.0"
snforge_std = "=0.51.2"
assert_macros = "2.15.1"

[scripts]
test = "snforge test"

[tool.scarb]
allow-prebuilt-plugins = [
  "dojo_cairo_macros",
  "snforge_scarb_plugin",
]

[[target.starknet-contract]]
sierra = true
casm = true
allowed-libfuncs-list.name = "experimental"
build-external-contracts = [
  "dojo::world::world_contract::world",
#   "achievement::events::index::e_TrophyCreation",
#   "achievement::events::index::e_TrophyProgression",
]

# debug contract size issues
# needed by `sozo build --stats.by-tag`
# https://docs.starknet.io/resources/chain-info/
# max felts = 81,920 felts
# casm = true


#--------------------------
# Dojo profiles declaration
#
[profile.dev]
[profile.slot]
[profile.sepolia]
[profile.mainnet]
